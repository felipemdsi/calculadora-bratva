<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora BRATVA</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <header class="topo">
      <div class="logo-area">
        <img src="logo-bratva.png" alt="Logo Bratva" class="logo" />
        <div class="titulos">
          <h1>BRATVA</h1>
          <p>Calculadora de Vendas</p>
        </div>
      </div>

      <div class="topo-direita">
        <span>Calculadora de Itens</span>
      </div>
    </header>

    <main class="grid">
      <section class="card">
        <div class="card-header itens-topo">
          <h2>Tabela de Valores</h2>
          <span class="badge" id="modoPreco">• PARCERIA ATIVA</span>
        </div>

        <div class="acoes-topo">
          <button class="btn-parceria" onclick="trocarParceria()">
            Alternar Parceria
          </button>
        </div>

        <div class="tabela-header tabela-itens">
          <span>OK</span>
          <span>ITEM</span>
          <span>PREÇO</span>
          <span>QTD.</span>
        </div>

        <div id="listaItens"></div>

        <div class="subtotal">
          <span>TOTAL ITENS:</span>
          <strong id="totalItens">R$ 0,00</strong>
        </div>
      </section>
    </main>

    <section class="resumo card">
      <div class="linha-resumo">
        <span>Total Vendas</span>
        <strong id="resumoVendas">R$ 0,00</strong>
      </div>

      <div class="linha-resumo">
        <span>Taxa Painel (60% sobre vendas)</span>
        <strong id="taxaPainel">R$ 0,00</strong>
      </div>

      <div class="linha-total-geral">
        <span>Valor Total de Itens + Painel</span>
        <strong id="valorFinal">R$ 0,00</strong>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
